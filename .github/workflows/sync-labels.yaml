name: Labels Sync

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ inputs.org || github.repository_owner }}
  cancel-in-progress: false

on:
  schedule:
    # every Sunday at 2:00 AM America/Chicago
    - cron: '0 2 * * 0'
      timezone: America/Chicago

  workflow_call:
    inputs:
      org:
        description: 'GitHub organization to sync labels in (defaults to the organization of the repository this action is run in)'
        type: string
      dry-run:
        description: 'Dry run'
        type: boolean
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        type: boolean
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string
    secrets:
      github-token:
        description: 'GitHub token for authentication'
        required: false

  workflow_dispatch:
    inputs:
      org:
        description: 'GitHub organization to sync labels in (defaults to the organization of the repository this action is run in)'
        type: string
      dry-run:
        description: 'Dry run'
        type: boolean
        default: true
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        type: boolean

jobs:
  repo-info:
    name: Get repo info
    runs-on: ubuntu-latest
    outputs:
      repo-owner: ${{ steps.repo-info.outputs.repo-owner }}
      repo-name: ${{ steps.repo-info.outputs.repo-name }}
    steps:
      - name: Get repo info
        id: repo-info
        uses: stairwaytowonderland/actions/.github/actions/repo-info-action@v1
        with:
          owner: ${{ inputs.org }}

  sync-labels:
    runs-on: ubuntu-latest
    needs: [repo-info]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ORG_REPO_USER_APP_ID }}
          private-key: ${{ secrets.ORG_REPO_USER_PRIVATE_KEY }}
          owner: ${{ needs.repo-info.outputs.repo-owner }}

      - name: Sync labels
        uses: stairwaytowonderland/actions/.github/actions/labels-sync-action@v1
        with:
          org: ${{ needs.repo-info.outputs.repo-owner }}
          dry-run: ${{ inputs.dry-run == true }}
          github-token: ${{ secrets.github-token || steps.generate-token.outputs.token }}
          update-existing: ${{ inputs.update-existing == true }}
          repos: |
            actions
            cpython
            node-semantic-release
            repository-create
            resume-converter
            simple-workflow-dispatch
            ^cloudflare-.*$
            ^python-.*$
            ^.*-management$
          repos-ignore: |
            ^\.github.*$
            ^deprecated-?.*$
            ^personal-?.*$
            ^.*-template$
