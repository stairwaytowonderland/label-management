name: Labels Sync

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ inputs.org || github.repository_owner }}
  cancel-in-progress: false

on:
  schedule:
    - cron: '0 0 * * 0' # every Sunday at midnight
      timezone: 'America/Chicago'

  workflow_call:
    inputs:
      org:
        description: 'GitHub organization to sync labels in (defaults to the organization of the repository this action is run in)'
        type: string
      dry-run:
        description: 'Dry run'
        type: boolean
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        type: boolean
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string
    secrets:
      github-token:
        description: 'GitHub token for authentication'
        required: false

  workflow_dispatch:
    inputs:
      org:
        description: 'GitHub organization to sync labels in (defaults to the organization of the repository this action is run in)'
        type: string
      dry-run:
        description: 'Dry run'
        type: boolean
        default: true
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        type: boolean
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string

jobs:
  sync-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Checkout shared actions repo
        if: inputs.ref != ''
        uses: actions/checkout@v6
        with:
          repository: stairwaytowonderland/actions
          ref: ${{ inputs.ref }}
          path: ./.actions
          sparse-checkout: |
            .github

      - name: Sync labels
        if: inputs.ref != ''
        uses: ./.actions/.github/actions/labels-sync-action
        with:
          org: ${{ inputs.org || github.repository_owner }}
          dry-run: ${{ inputs.dry-run == true }}
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          update-existing: ${{ inputs.update-existing == true }}
          repos: |
            actions
            cpython
            node-semantic-release
            repository-create
            resume-converter
            simple-workflow-dispatch
            ^cloudflare-.*$
            ^python-.*$
            ^repository-.*$
            ^.*-template$
          repos-ignore: |
            ^\.github.*$
            ^deprecated-?.*$
            ^personal-?.*$

      - name: Sync labels
        if: inputs.ref == ''
        uses: stairwaytowonderland/actions/.github/actions/labels-sync-action@v1
        with:
          org: ${{ inputs.org || github.repository_owner }}
          dry-run: ${{ inputs.dry-run == true }}
          github-token: ${{ secrets.github-token || secrets.GITHUB_TOKEN }}
          update-existing: ${{ inputs.update-existing == true }}
          repos: |
            actions
            cpython
            node-semantic-release
            repository-create
            resume-converter
            simple-workflow-dispatch
            ^cloudflare-.*$
            ^python-.*$
            ^repository-.*$
            ^.*-template$
          repos-ignore: |
            ^\.github.*$
            ^deprecated-?.*$
            ^personal-?.*$
