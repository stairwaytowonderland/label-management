name: Labels Create

concurrency:
  group: ${{ github.repository }}-${{ github.workflow }}-${{ format('{0}/{1}', inputs.owner, inputs.repo) || github.repository }}
  cancel-in-progress: false

on:
  workflow_call:
    inputs:
      owner:
        description: 'GitHub organization or user that owns the repository'
        type: string
      repo:
        description: 'GitHub repository name (if not the current repository)'
        type: string
      dry-run:
        description: 'Dry run'
        type: boolean
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        type: boolean
      ref:
        description: 'Git ref of the shared actions repo to use (e.g. main or a specific tag/commit)'
        type: string
    secrets:
      github-token:
        description: 'GitHub token for authentication'

  workflow_dispatch:
    inputs:
      owner:
        description: 'GitHub organization or user that owns the repository'
        type: string
      repo:
        description: 'GitHub repository name (if not the current repository)'
        type: string
      dry-run:
        description: 'Dry run'
        type: boolean
        default: true
      update-existing:
        description: 'Whether to update existing labels (e.g. rename, change color/description).'
        type: boolean

  workflow_run:
    workflows: ['_']
    types: [completed]

jobs:
  repo-info:
    name: Get repo info
    runs-on: ubuntu-latest
    outputs:
      repo-owner: ${{ steps.repo-info.outputs.repo-owner }}
      repo-name: ${{ steps.repo-info.outputs.repo-name }}
    steps:
      - name: Get repo info
        id: repo-info
        uses: stairwaytowonderland/actions/.github/actions/repo-info-action@v1
        with:
          owner: ${{ inputs.owner }}
          repo: ${{ inputs.repo }}

  create-labels:
    runs-on: ubuntu-latest
    needs: [repo-info]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Generate GitHub App Token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.ORG_REPO_USER_APP_ID }}
          private-key: ${{ secrets.ORG_REPO_USER_PRIVATE_KEY }}
          owner: ${{ needs.repo-info.outputs.repo-owner }}
          repositories: ${{ needs.repo-info.outputs.repo-name }}

      - name: Create labels (with default actions ref)
        uses: stairwaytowonderland/actions/.github/actions/labels-create-action@v1
        with:
          github-token: ${{ secrets.github-token || steps.generate-token.outputs.token }}
          owner: ${{ needs.repo-info.outputs.repo-owner }}
          repo: ${{ needs.repo-info.outputs.repo-name }}
          dry-run: ${{ inputs.dry-run == true }}
          update-existing: ${{ inputs.update-existing == true }}
